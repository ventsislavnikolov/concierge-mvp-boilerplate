name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Always runs, needs no secrets — the gate for every push, PR, and fork.
  # build runs before typecheck: it generates src/paraglide (gitignored,
  # compiler-output) that the type check depends on.
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test

  # Decides whether the E2E smoke can run — secrets aren't readable in a
  # job-level `if`, so a tiny job turns the secret's presence into an output.
  guard:
    runs-on: ubuntu-latest
    outputs:
      e2e: ${{ steps.check.outputs.e2e }}
    steps:
      - id: check
        env:
          VITE_CONVEX_URL: ${{ secrets.VITE_CONVEX_URL }}
        run: |
          if [ -n "$VITE_CONVEX_URL" ]; then
            echo "e2e=true" >> "$GITHUB_OUTPUT"
          else
            echo "e2e=false" >> "$GITHUB_OUTPUT"
            echo "VITE_CONVEX_URL not set — E2E job will be skipped."
          fi

  # Fake-door Playwright smoke against a Convex deployment. Whole job is
  # skipped unless VITE_CONVEX_URL is set (forks stay green). Point the
  # secrets at a CI-only Convex deployment, not the local-dev one — the
  # specs write real e2e-* leads and funnel events.
  e2e:
    needs: guard
    if: needs.guard.outputs.e2e == 'true'
    runs-on: ubuntu-latest
    env:
      VITE_CONVEX_URL: ${{ secrets.VITE_CONVEX_URL }}
      VITE_CONVEX_SITE_URL: ${{ secrets.VITE_CONVEX_SITE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      # Only the fake-door smoke: it needs just VITE_CONVEX_URL. The
      # realtime spec needs Convex CLI creds + an auth-configured
      # deployment, so it stays a local gate.
      - run: pnpm exec playwright test fake-door
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # semantic-release cuts a GitHub release from conventional commits.
  release:
    needs: check
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
